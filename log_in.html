<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ONLINE JOBS HIRING</title>
<style>
/* --------- Body & Form Styling --------- */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f1f3f6;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.form-container {
    background: #fff;
    padding: 30px 25px;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    width: 350px;
    text-align: center;
}

h1.main-title {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

/* Input fields */
input[type="text"], input[type="password"], input[type="email"] {
    width: 100%;
    padding: 10px 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    font-size: 15px;
    transition: all 0.3s ease;
}
input:focus {
    border-color: #3399ff;
    box-shadow: 0 0 5px rgba(51,153,255,0.5);
    outline: none;
}

/* Buttons */
button.btn {
    width: 100%;
    padding: 12px;
    background-color: #3399ff;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.3s ease;
}
button.btn:hover {
    background-color: #287acc;
}

/* Password toggle */
.password-wrapper {
    position: relative;
}
.password-wrapper button {
    position: absolute;
    right: 5px;
    top: 5px;
    background: #ddd;
    border: none;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
}
.password-wrapper button:hover {
    background: #ccc;
}

/* Messages */
.message {
    margin-top: 10px;
    font-size: 14px;
}

/* Links */
.register-link, .forgot-link {
    font-size: 14px;
    margin-top: 10px;
}
.register-link a, .forgot-link a {
    color: #3399ff;
    text-decoration: none;
}
.register-link a:hover, .forgot-link a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>

<div class="form-container">
    <h1 class="main-title">ONLINE JOBS HIRING</h1>

    <input type="text" id="loginUsername" placeholder="Username" required>
    
    <div class="password-wrapper">
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="button" id="toggleLoginEye">Show</button>
    </div>

    <button class="btn" id="loginBtn">Login</button>
    <p id="loginMessage" class="message"></p>
    
    <p class="register-link">
        Don't have an account? <a href="register.html">Register</a>
    </p>
    <p class="forgot-link">
        Forgot password? <a href="#" id="forgotPassLink">Reset</a>
    </p>
</div>

<script>
// Password show/hide
const loginPassword = document.getElementById("loginPassword");
const toggleLoginEye = document.getElementById("toggleLoginEye");
toggleLoginEye.addEventListener("click", () => {
    if (loginPassword.type === "password") {
        loginPassword.type = "text";
        toggleLoginEye.textContent = "Hide";
    } else {
        loginPassword.type = "password";
        toggleLoginEye.textContent = "Show";
    }
});

// Pre-create test user if users list empty
if (!localStorage.getItem("users")) {
    localStorage.setItem("users", JSON.stringify([
        { username: "testuser", password: "1234", email: "test@example.com" }
    ]));
}

// Login
const loginUsername = document.getElementById("loginUsername");
const loginBtn = document.getElementById("loginBtn");
const loginMessage = document.getElementById("loginMessage");

loginBtn.onclick = () => {
    const username = loginUsername.value.trim();
    const password = loginPassword.value.trim();

    if (!username || !password) {
        loginMessage.style.color = "red";
        loginMessage.textContent = "Both fields are required.";
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];
    const user = users.find(u => u.username === username && u.password === password);

    if (user) {
        localStorage.setItem("currentUser", JSON.stringify(user));
        loginMessage.style.color = "green";
        loginMessage.textContent = `Welcome, ${user.username}! Redirecting...`;
        setTimeout(() => window.location.href = "index.html", 800);
    } else {
        loginMessage.style.color = "red";
        loginMessage.textContent = "Invalid username or password.";
    }
};

// Forgot password
document.getElementById("forgotPassLink").addEventListener("click", () => {
    const email = prompt("Enter your registered email:");
    if (!email) return;
    
    let users = JSON.parse(localStorage.getItem("users")) || [];
    const user = users.find(u => u.email === email.trim());
    if (user) {
        const newPass = prompt("Enter your new password:");
        if (newPass) {
            user.password = newPass;
            localStorage.setItem("users", JSON.stringify(users));
            alert("Password reset successfully! Please login with new password.");
        }
    } else {
        alert("Email not found. Please register.");
    }
});
</script>
</body>
</html>
