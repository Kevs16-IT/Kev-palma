<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Job Hiring</title>
<style>
/* ---------- BODY & GENERAL ---------- */
body { 
    font-family: Arial, sans-serif; 
    margin: 0; 
    background: #f8f9fa; 
}

/* ---------- HEADER ---------- */
.title-navbar {
    text-align: center;
    background: linear-gradient(90deg, #4e73df, #1cc88a);
    color: white;
    padding: 20px 10px;
    font-size: 28px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    position: relative;
}

/* ---------- NAVBAR ---------- */
.button-navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #ffffff;
    padding: 10px 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.nav-buttons a {
    text-decoration: none;
    color: #4e73df;
    font-weight: bold;
    margin-right: 15px;
    transition: 0.3s;
}
.nav-buttons a:hover { color: #1cc88a; }

/* ---------- PROFILE & LOGOUT ---------- */
.profile-container {
    display: flex;
    align-items: center;
    gap: 10px;
}
.profile-container img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #4e73df; }
.username { font-weight: bold; }

.logout-btn-container {
    position: absolute;
    top: 20px;
    right: 20px;
}
.logout-btn {
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    transition: 0.3s;
    background-color: #dc3545;
    color: white;
}
.logout-btn:hover { background-color: #c82333; }

/* ---------- MAIN CONTENT ---------- */
.container {
    max-width: 900px;
    margin: 40px auto;
    text-align: center;
}

/* ---------- JOB CARDS ---------- */
.job-card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    margin-bottom: 20px;
    text-align: left;
}
.job-card h3 { color: #4e73df; margin-bottom: 10px; }

/* ---------- BUTTONS ---------- */
.btn {
    padding: 6px 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    margin: 2px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    transition: 0.3s;
}
.edit-btn { background: #4e73df; color: white; }        
.edit-btn:hover { background: #2e59d9; }
.delete-btn { background: #dc3545; color: white; }      
.delete-btn:hover { background: #c82333; }
.viewApplicants-btn { background: #1cc88a; color: white; }  
.viewApplicants-btn:hover { background: #17a673; }
.view-btn { background: #17a2b8; color: white; }        
.view-btn:hover { background: #117a8b; }
.hired-btn { background: #28a745; color: white; }      
.hired-btn:hover { background: #218838; }
.decline-btn { background: #ffc107; color: white; }    
.decline-btn:hover { background: #e0a800; }
.close-btn { background: #6c757d; color: white; }       
.close-btn:hover { background: #5a6268; }
.save-btn { background: #1cc88a; color: white; }        
.save-btn:hover { background: #17a673; }
.cancel-btn { background: #6c757d; color: white; }     
.cancel-btn:hover { background: #5a6268; }

/* ---------- MODAL ---------- */
.modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 600px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    z-index: 1000;
    max-height: 90vh;
    overflow-y: auto;
}

/* ---------- RESUME ---------- */
.resume-img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; display: block; margin: auto; }
.resume-section { margin-bottom: 10px; }
input, textarea { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
</style>
</head>
<body>

<!-- LOGOUT BUTTON -->
<div class="logout-btn-container">
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- HEADER -->
<header class="title-navbar">ONLINE JOBS HIRING</header>

<!-- NAVBAR -->
<nav class="button-navbar">
    <div class="nav-buttons">
        <a href="index.html">Home</a>
        <a href="view_all_jobs.html">View All Posted Jobs</a>
    </div>
    <div class="profile-container">
        <div id="profilePictureContainer"></div>
        <div id="usernameContainer" class="username"></div>
    </div>
</nav>

<main class="container">
    <h2>Your Posted Jobs</h2>
    <section id="postedJobsSection"></section>
</main>

<script>
// ---------- LOGOUT ----------
function logout(){
    localStorage.removeItem("currentUser");
    alert("Logged out");
    location.href="log_in.html";
}

// ---------- PROFILE ----------
const currentUser = JSON.parse(localStorage.getItem("currentUser")) || {};
document.getElementById("profilePictureContainer").innerHTML =
    `<img src="${currentUser.profilePic || '#'}">`;
document.getElementById("usernameContainer").textContent = currentUser.username || "";

// ---------- JOBS ----------
let jobs = JSON.parse(localStorage.getItem("jobs")) || [];
const postedJobsSection = document.getElementById("postedJobsSection");

function renderJobs(){
    postedJobsSection.innerHTML = "";
    const userJobs = jobs.filter(job => job.postedBy === currentUser.username);

    userJobs.forEach(job => {
        const card = document.createElement("div");
        card.classList.add("job-card");
        card.innerHTML = `
            <h3>${job.title}</h3>
            <p><b>Company:</b> ${job.company}</p>
            <p><b>Location:</b> ${job.location}</p>
            <p><b>Salary:</b> ${job.salary || "Not Specified"}</p>
            <p><b>Description:</b> ${job.description || ""}</p>
            <div>
                <button class="btn edit-btn" onclick="editJob('${job.title}')">Edit</button>
                <button class="btn delete-btn" onclick="deleteJob('${job.title}')">Delete</button>
                <button class="btn viewApplicants-btn" onclick="viewApplicants('${job.title}')">View Applicants</button>
            </div>
        `;
        postedJobsSection.appendChild(card);
    });
}
renderJobs();

// ---------- EDIT JOB ----------
function editJob(title){
    const job = jobs.find(j => j.title === title);
    const modal = document.createElement("div");
    modal.classList.add("modal");
    modal.innerHTML = `
        <h2>Edit Job</h2>
        <label>Job Title</label><input id="editTitle" value="${job.title}">
        <label>Company</label><input id="editCompany" value="${job.company}">
        <label>Location</label><input id="editLocation" value="${job.location}">
        <label>Salary</label><input id="editSalary" value="${job.salary}">
        <label>Description</label><textarea id="editDescription">${job.description}</textarea>
        <label>Company Link</label><input id="editLink" value="${job.link || ''}">
        <button class="btn save-btn" id="saveEdit">Save Changes</button>
        <button class="btn cancel-btn" id="cancelEdit">Cancel</button>
    `;
    document.body.appendChild(modal);
    document.getElementById("cancelEdit").onclick = () => modal.remove();
    document.getElementById("saveEdit").onclick = () => {
        job.title = document.getElementById("editTitle").value;
        job.company = document.getElementById("editCompany").value;
        job.location = document.getElementById("editLocation").value;
        job.salary = document.getElementById("editSalary").value;
        job.description = document.getElementById("editDescription").value;
        job.link = document.getElementById("editLink").value;
        localStorage.setItem("jobs", JSON.stringify(jobs));
        modal.remove();
        renderJobs();
        alert("Job Updated!");
    };
}

// ---------- DELETE JOB ----------
function deleteJob(title){
    if(!confirm("Are you sure you want to delete this job?")) return;
    jobs = jobs.filter(j => j.title !== title);
    localStorage.setItem("jobs", JSON.stringify(jobs));
    renderJobs();
}

// ---------- VIEW APPLICANTS ----------
function viewApplicants(title){
    const job = jobs.find(j => j.title === title);
    if(!job.applicants || job.applicants.length === 0){ alert("No applicants yet"); return; }
    const modal = document.createElement("div");
    modal.classList.add("modal");
    modal.innerHTML = `<h3>Applicants for ${title}</h3>`;
    job.applicants.forEach(app => {
        if(!app.status) app.status = "Pending";
        const div = document.createElement("div");
        div.classList.add("applicant-entry");
        div.innerHTML = `
            <span>${app.name} (${app.status})</span>
            <div>
                <button class="btn view-btn">View Resume</button>
                <button class="btn hired-btn">Hired</button>
                <button class="btn decline-btn">Decline</button>
            </div>
        `;
        div.querySelector(".view-btn").onclick = () => showResume(app);
        div.querySelector(".hired-btn").onclick = () => { app.status="Approved"; localStorage.setItem("jobs",JSON.stringify(jobs)); alert(app.name+" hired"); div.remove(); };
        div.querySelector(".decline-btn").onclick = () => { app.status="Declined"; localStorage.setItem("jobs",JSON.stringify(jobs)); alert(app.name+" declined"); div.remove(); };
        modal.appendChild(div);
    });
    const close = document.createElement("button");
    close.textContent = "Close";
    close.classList.add("btn","close-btn");
    close.onclick = () => modal.remove();
    modal.appendChild(close);
    document.body.appendChild(modal);
}

// ---------- VIEW RESUME ----------
function showResume(resume){
    const modal = document.createElement("div");
    modal.classList.add("modal");
    modal.innerHTML = `
        <h2>${resume.name}'s Resume</h2>
        <img src="${resume.profile || '#'}" class="resume-img">
        <div class="resume-section"><b>Address:</b> ${resume.address || ''}</div>
        <div class="resume-section"><b>Cell:</b> ${resume.cell || ''}</div>
        <div class="resume-section"><b>Email:</b> ${resume.email || ''}</div>
        <div class="resume-section"><b>Objectives:</b> ${resume.objectives || ''}</div>
        <div class="resume-section"><b>Birthdate:</b> ${resume.birthdate || ''}</div>
        <div class="resume-section"><b>Age:</b> ${resume.age || ''}</div>
        <div class="resume-section"><b>Birthplace:</b> ${resume.birthplace || ''}</div>
        <div class="resume-section"><b>Sex:</b> ${resume.sex || ''}</div>
        <div class="resume-section"><b>Status:</b> ${resume.status || ''}</div>
        <div class="resume-section"><b>Height:</b> ${resume.height || ''}</div>
        <div class="resume-section"><b>Weight:</b> ${resume.weight || ''}</div>
        <div class="resume-section"><b>Religion:</b> ${resume.religion || ''}</div>
        <div class="resume-section"><b>Nationality:</b> ${resume.nationality || ''}</div>
        <div class="resume-section"><b>Education:</b> ${resume.education || ''}</div>
        <div class="resume-section"><b>Skills:</b> ${resume.skills || ''}</div>
        <div class="resume-section"><b>Achievements:</b> ${resume.achievements || ''}</div>
        <button class="btn close-btn">Close</button>
    `;
    modal.querySelector(".close-btn").onclick = () => modal.remove();
    document.body.appendChild(modal);
}
</script>

</body>
</html>
