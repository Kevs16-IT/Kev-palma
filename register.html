<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - ONLINE JOBS HIRING</title>
<style>
/* --------- Body & Form Styling --------- */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f1f3f6;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.form-container {
    background: #fff;
    padding: 30px 25px;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    width: 350px;
    text-align: center;
}

h1.main-title {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

/* Input fields */
input[type="text"], input[type="password"], input[type="file"], input[type="email"] {
    width: 100%;
    padding: 10px 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    font-size: 15px;
    transition: all 0.3s ease;
}
input:focus {
    border-color: #3399ff;
    box-shadow: 0 0 5px rgba(51,153,255,0.5);
    outline: none;
}

/* Buttons */
button.btn {
    width: 100%;
    padding: 12px;
    background-color: #3399ff;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.3s ease;
}
button.btn:hover {
    background-color: #287acc;
}

/* Password toggle */
.password-wrapper {
    position: relative;
}
.password-wrapper button {
    position: absolute;
    right: 5px;
    top: 5px;
    background: #ddd;
    border: none;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
}
.password-wrapper button:hover {
    background: #ccc;
}

/* Messages */
.message {
    margin-top: 10px;
    font-size: 14px;
}

/* Links */
.register-link {
    font-size: 14px;
    margin-top: 10px;
}
.register-link a {
    color: #3399ff;
    text-decoration: none;
}
.register-link a:hover {
    text-decoration: underline;
}

/* Profile preview */
#previewPic {
    display: none;
    width: 100px;
    margin-top: 10px;
    border-radius: 50%;
}
</style>
</head>
<body>

<div class="form-container">
    <h1 class="main-title">ONLINE JOBS HIRING</h1>

    <input type="text" id="regUsername" placeholder="Username" required>

    <input type="email" id="regEmail" placeholder="Email" required>

    <div class="password-wrapper">
        <input type="password" id="regPassword" placeholder="Password" required>
        <button type="button" id="toggleRegEye">Show</button>
    </div>

    <div>
        <label for="profilePic">Profile Picture</label>
        <input type="file" id="profilePic" accept="image/*">
        <img id="previewPic" src="" alt="Preview">
    </div>

    <button class="btn" id="registerBtn">Register</button>
    <p id="regMessage" class="message"></p>

    <p class="register-link">
        Already have an account? <a href="log_in.html">Login</a>
    </p>
</div>

<script>
// Show/hide password
const regPassword = document.getElementById("regPassword");
const toggleRegEye = document.getElementById("toggleRegEye");
toggleRegEye.addEventListener("click", () => {
    if (regPassword.type === "password") {
        regPassword.type = "text";
        toggleRegEye.textContent = "Hide";
    } else {
        regPassword.type = "password";
        toggleRegEye.textContent = "Show";
    }
});

// Profile picture preview
const profilePicInput = document.getElementById("profilePic");
const previewPic = document.getElementById("previewPic");
let profilePicData = "";

profilePicInput.addEventListener("change", () => {
    const file = profilePicInput.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = () => {
            profilePicData = reader.result; // Base64 string
            previewPic.src = profilePicData;
            previewPic.style.display = "block";
        };
        reader.readAsDataURL(file);
    }
});

// Registration logic
const registerBtn = document.getElementById("registerBtn");
const regUsername = document.getElementById("regUsername");
const regEmail = document.getElementById("regEmail");
const regMessage = document.getElementById("regMessage");

registerBtn.onclick = () => {
    const username = regUsername.value.trim();
    const email = regEmail.value.trim();
    const password = regPassword.value.trim();

    if (!username || !email || !password) {
        regMessage.style.color = "red";
        regMessage.textContent = "All fields are required.";
        return;
    }

    // Simple email validation
    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!email.match(emailPattern)) {
        regMessage.style.color = "red";
        regMessage.textContent = "Please enter a valid email.";
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    // Check if username or email exists
    if (users.some(u => u.username === username)) {
        regMessage.style.color = "red";
        regMessage.textContent = "Username already exists.";
        return;
    }
    if (users.some(u => u.email === email)) {
        regMessage.style.color = "red";
        regMessage.textContent = "Email already registered.";
        return;
    }

    // Add new user
    users.push({ username, email, password, profilePic: profilePicData });
    localStorage.setItem("users", JSON.stringify(users));

    regMessage.style.color = "green";
    regMessage.textContent = "Registration successful! Redirecting to login...";

    setTimeout(() => window.location.href = "log_in.html", 1000);
};
</script>

</body>
</html>x
